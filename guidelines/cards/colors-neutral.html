<!-- @dsCard group="Colors" viewport="700x150" name="Light neutrals" subtitle="Ink & surfaces for light contexts" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: #fff; padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 130px; height: 108px; border-radius: var(--radius-lg); padding: 12px 14px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--k-line); }
  .sw .n { font-size: 13px; font-weight: 600; color: var(--k-ink-1); }
  .sw .h { font-size: 12px; color: var(--k-ink-2); }
</style>
</head>
<body class="k-root">
  <div class="row">
    <div class="sw" style="background:#fff"><span class="n">Surface</span><span class="h">#FFFFFF</span></div>
    <div class="sw" style="background:var(--k-surface-2)"><span class="n">Raised</span><span class="h">#FAFAFA</span></div>
    <div class="sw" style="background:var(--k-surface-3)"><span class="n">Tint</span><span class="h">#F5F7FB</span></div>
    <div class="sw" style="background:var(--k-ink-1)"><span class="n" style="color:#fff">Ink 1</span><span class="h" style="color:#ccc">#333333</span></div>
    <div class="sw" style="background:var(--k-ink-2)"><span class="n" style="color:#fff">Ink 2</span><span class="h" style="color:#eee">#666666</span></div>
  </div>
</body>
</html>
