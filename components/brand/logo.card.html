<!-- @dsCard group="Components" viewport="700x300" name="Logo" subtitle="Variants, sizes & currentColor recoloring" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js?v=4"></script>
<style>
  body { margin: 0; background: #fff; }
  .wrap { display: flex; flex-direction: column; gap: 22px; padding: 24px; }
  .group { display: flex; flex-direction: column; gap: 10px; }
  .cap { font-family: var(--font-body); font-size: 12px; color: var(--k-ink-3); }
  .row { display: flex; align-items: flex-end; gap: 28px; flex-wrap: wrap; }
  .sw { display: flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 12px; }
</style>
</head>
<body class="k-root">
  <div class="wrap" id="root"></div>
  <script type="text/babel">
    const { Logo } = window.KlerosDesignSystem_398995;
    function Spec() {
      return (
        <>
          <div className="group">
            <span className="cap">variant="wordmark" — sizes 20 / 28 / 40</span>
            <div className="row" style={{ color: 'var(--k-purple)' }}>
              <Logo height={20} />
              <Logo height={28} />
              <Logo height={40} />
            </div>
          </div>
          <div className="group">
            <span className="cap">variant="symbol" — sizes 24 / 36 / 56</span>
            <div className="row" style={{ color: 'var(--k-purple)' }}>
              <Logo variant="symbol" height={24} />
              <Logo variant="symbol" height={36} />
              <Logo variant="symbol" height={56} />
            </div>
          </div>
          <div className="group">
            <span className="cap">currentColor — set color per context</span>
            <div className="row">
              <span className="sw" style={{ background: 'var(--k-bg-1)', color: '#fff' }}><Logo variant="symbol" height={32} /></span>
              <span className="sw" style={{ background: 'var(--k-purple)', color: '#fff' }}><Logo variant="symbol" height={32} /></span>
              <span className="sw" style={{ background: '#fff', border: '1px solid var(--k-line)', color: 'var(--k-purple)' }}><Logo variant="symbol" height={32} /></span>
              <span className="sw" style={{ background: '#fff', border: '1px solid var(--k-line)', color: 'var(--k-ink-1)' }}><Logo variant="symbol" height={32} /></span>
              <span className="sw" style={{ background: 'var(--k-blue-2)', color: 'var(--k-bg-1)' }}><Logo variant="symbol" height={32} /></span>
            </div>
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Spec />);
  </script>
</body>
</html>
