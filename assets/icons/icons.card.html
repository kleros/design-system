<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js?v=4"></script>
<style>
  body { margin: 0; background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 14px; padding: 24px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--k-ink-1); }
  .cell .lab { font-family: var(--font-body); font-size: 10px; color: var(--k-ink-3); text-align:center; }
  .ico { width: 28px; height: 28px; display:flex; align-items:center; justify-content:center; }
</style>
</head>
<body class="k-root">
  <div id="root" class="grid"></div>
  <script type="text/babel">
    const K = window.KlerosDesignSystem_398995;
    const { Icon } = K;
    const names = ["IconsGavel","IconsJuror","IconsVote","IconsGovernance","IconsDocument","IconsReport","IconsPNK","IconsCoins","IconsReward","IconsIncentives","IconsCurator","IconsTransparency","IconsGlobe","IconsCheck","IconsCheckCircleFull","IconsCloseCircleOutline","IconsMenu","IconsArrowChevronDown","IconsMailOutline","IconsMoon","IconsSun","IconsChallenge","IconsCollective"];
    function Grid() {
      return names.map((n) => (
        <div className="cell" key={n}>
          <span className="ico"><Icon name={n} size={n.length>10 && /Juror|Vote|Governance|Document|Report|Reward|Incentives|Curator|Transparency|Challenge|Collective/.test(n) ? 28 : 24} /></span>
          <span className="lab">{n.replace('Icons','')}</span>
        </div>
      ));
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Grid />);
  </script>
</body>
</html>
