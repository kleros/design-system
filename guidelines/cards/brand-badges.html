<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: #fff; }
  .row { display: flex; gap: 16px; flex-wrap: wrap; }
  .badge { display:flex; align-items:center; height: 96px; padding: 0 28px; border-radius: var(--radius-lg); }
  .badge img { height: 26px; display:block; }
</style>
</head>
<body class="k-root">
  <div class="row">
    <div class="badge" style="background: var(--k-bg-1)"><img src="../../assets/brand/badge-secured-by-kleros.svg" alt="Secured by Kleros" style="filter: invert(1)" /></div>
    <div class="badge" style="background: var(--k-purple)"><img src="../../assets/brand/badge-built-by-kleros.svg" alt="Built by Kleros" style="filter: invert(1)" /></div>
    <div class="badge" style="background: #fff; border: 1px solid var(--k-line)"><img src="../../assets/brand/badge-secured-by-kleros.svg" alt="Secured by Kleros" /></div>
  </div>
</body>
</html>
