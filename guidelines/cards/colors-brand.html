<!-- @dsCard group="Colors" viewport="700x150" name="Brand — Purple & Blue" subtitle="Purple at the core, blue on details" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--k-white); padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sw { width: 156px; height: 108px; border-radius: var(--radius-lg); padding: 12px 14px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; }
  .sw .n { font-size: 14px; font-weight: 600; }
  .sw .h { font-size: 13px; opacity: .85; font-family: var(--font-body); }
</style>
</head>
<body class="k-root">
  <div class="row">
    <div class="sw" style="background: var(--k-purple)"><span class="n">Primary Purple</span><span class="h">#9013FE</span></div>
    <div class="sw" style="background: var(--k-purple-2)"><span class="n">Secondary Purple</span><span class="h">#9747FF</span></div>
    <div class="sw" style="background: var(--k-blue); color:#04313f"><span class="n">Primary Blue</span><span class="h">#27CDFE</span></div>
    <div class="sw" style="background: var(--k-blue-2); color:#04313f"><span class="n">Secondary Blue</span><span class="h">#7CE2FF</span></div>
    <div class="sw" style="background: var(--gradient-brand)"><span class="n">Brand Gradient</span><span class="h">purple → blue</span></div>
  </div>
</body>
</html>
