<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js?v=4"></script>
<style>
  body { margin: 0; background: #fff; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 24px; align-items: start; }
  .stack { display: flex; flex-direction: column; gap: 16px; }
</style>
</head>
<body class="k-root">
  <div id="root" class="grid"></div>
  <script type="text/babel">
    const K = window.KlerosDesignSystem_398995;
    const { Input, Select, Checkbox, Radio, Switch, Tabs } = K;
    function Demo() {
      const [tab, setTab] = React.useState('DAOs');
      return (
        <>
          <div className="stack">
            <Input label="Email" placeholder="you@example.com" />
            <Select label="Court" options={['General Court','Blockchain','Curation','Marketing']} />
            <Tabs items={['DAOs','DeFi','Marketplaces']} value={tab} onChange={setTab} />
          </div>
          <div className="stack">
            <Checkbox label="I agree to the Terms" defaultChecked />
            <Checkbox label="Subscribe to updates" />
            <Radio name="role" label="Juror" defaultChecked />
            <Radio name="role" label="Curator" />
            <Switch label="Dark mode" defaultChecked />
          </div>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
  </script>
</body>
</html>
