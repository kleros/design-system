<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kleros — Decentralized Justice</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js?v=4"></script>
<style>
  body { margin: 0; background: #fff; }
  .page { width: 1440px; margin: 0 auto; }
  .heroband { background: var(--gradient-hero); }
</style>
</head>
<body class="k-root">
  <div id="root"></div>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel">
    function HomePage() {
      return (
        <div className="page">
          <div className="heroband k-dark">
            <PromoBar />
            <KNav />
            <Hero />
          </div>
          <TrustedBy />
          <Reimagining />
          <Ecosystem />
          <Participate />
          <Portfolio />
          <KFooter />
        </div>
      );
    }
    const start = () => {
      if (!window.Portfolio) return void requestAnimationFrame(start);
      ReactDOM.createRoot(document.getElementById('root')).render(<HomePage />);
    };
    start();
  </script>
</body>
</html>
