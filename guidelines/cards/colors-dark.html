<!-- @dsCard group="Colors" viewport="700x150" name="Deep-purple surfaces" subtitle="Dark-theme backgrounds & ink" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--k-bg-1); padding: 20px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: stretch; }
  .sw { width: 130px; height: 108px; border-radius: var(--radius-lg); padding: 12px 14px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; border: 1px solid var(--k-on-dark-border); }
  .sw .n { font-size: 13px; font-weight: 600; }
  .sw .h { font-size: 12px; opacity: .8; }
  .ink { display:flex; gap:10px; align-items:flex-end; }
  .dot { width: 28px; height: 28px; border-radius: 50%; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--k-bg-1)"><span class="n">Background 1</span><span class="h">#220050</span></div>
    <div class="sw" style="background: var(--k-bg-2)"><span class="n">Background 2</span><span class="h">#1B003F</span></div>
    <div class="sw" style="background: var(--k-bg-3)"><span class="n">Raised</span><span class="h">#27005C</span></div>
    <div class="sw" style="background: var(--k-bg-1); justify-content: space-between;">
      <span class="n" style="color:#fff">Ink on dark</span>
      <div class="ink">
        <span class="dot" style="background:#fff" title="#FFFFFF"></span>
        <span class="dot" style="background:var(--k-on-dark-2)" title="#DAF0FF"></span>
        <span class="dot" style="background:var(--k-on-dark-3)" title="#BECCE5"></span>
        <span class="dot" style="background:var(--k-on-dark-border)" title="#42498F border"></span>
      </div>
    </div>
  </div>
</body>
</html>
