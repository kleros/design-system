<!-- @startingPoint section="Website" subtitle="Kleros contact page" viewport="1440x860" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kleros — Get in touch</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js?v=4"></script>
<style>
  body { margin: 0; background: #fff; }
  .page { width: 1440px; margin: 0 auto; }
  .heroband { background: var(--gradient-hero); }
  .wrap { max-width: 1184px; margin: 0 auto; padding: 0 32px; }
</style>
</head>
<body class="k-root">
  <div id="root"></div>
  <script type="text/babel">
    function App() {
      const K = window.KlerosDesignSystem_398995;
      const { Navbar, Footer, Logo, Icon, Input, Textarea, Select, Checkbox, Button, Card } = K;
      const [sent, setSent] = React.useState(false);

      function ContactInfo() {
        const items = [
          { icon: 'IconsMailOutline', label: 'Email', value: 'contact@kleros.io' },
          { icon: 'IconsGlobe', label: 'Community', value: 'Telegram · Discord · Forum' },
          { icon: 'IconsDocument', label: 'Docs', value: 'Integration & API reference' },
        ];
        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>
            <div>
              <span className="k-eyebrow" style={{ color: 'var(--k-blue-2)' }}>Contact</span>
              <h1 style={{ fontFamily: 'var(--font-display)', fontWeight: 500, fontSize: 56, lineHeight: 1.05, margin: '12px 0 16px', color: '#fff' }}>Get in touch</h1>
              <p style={{ fontSize: 18, color: 'var(--k-on-dark-2)', maxWidth: 420, lineHeight: 1.5, margin: 0 }}>
                Building with decentralized justice, integrating Kleros, or exploring enterprise arbitration? Tell us what you need.
              </p>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              {items.map((it) => (
                <div key={it.label} style={{ display: 'flex', gap: 14, alignItems: 'center' }}>
                  <span style={{ display: 'inline-flex', width: 44, height: 44, borderRadius: 12, background: 'rgba(255,255,255,.08)', alignItems: 'center', justifyContent: 'center', color: 'var(--k-blue-2)', flex: 'none' }}><Icon name={it.icon} size={20} /></span>
                  <div>
                    <div style={{ fontSize: 13, color: 'var(--k-on-dark-3)' }}>{it.label}</div>
                    <div style={{ fontSize: 16, color: '#fff', fontWeight: 500 }}>{it.value}</div>
                  </div>
                </div>
              ))}
            </div>
            <div aria-hidden style={{ color: '#fff', opacity: .12, marginTop: 8 }}><Logo variant="symbol" height={120} /></div>
          </div>
        );
      }

      function FormCard() {
        return (
          <div className="k-light">
          <Card>
            <div style={{ padding: 36 }}>
              {sent ? (
                <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', textAlign: 'center', gap: 16, padding: '40px 0' }}>
                  <span style={{ color: 'var(--k-success)' }}><Icon name="IconsCheckCircleFull" size={48} /></span>
                  <h3 style={{ fontSize: 24, fontWeight: 500, margin: 0, color: 'var(--k-ink-1)' }}>Message sent</h3>
                  <p style={{ color: 'var(--k-ink-2)', margin: 0 }}>Thanks — the Kleros team will get back to you shortly.</p>
                  <Button variant="tertiary" onClick={() => setSent(false)}>Send another</Button>
                </div>
              ) : (
                <form onSubmit={(e) => { e.preventDefault(); setSent(true); }} style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>
                    <Input label="Full name" placeholder="Ada Lovelace" required />
                    <Input label="Work email" type="email" placeholder="you@company.com" required />
                  </div>
                  <Input label="Organization" placeholder="Your project or company" />
                  <Select label="I'm interested in" options={['Integrating Kleros','Becoming a juror','Enterprise arbitration','Partnership','Press / media','Something else']} />
                  <Textarea label="Message" placeholder="Tell us about your use case…" rows={5} />
                  <Checkbox label="I agree to be contacted about my enquiry." defaultChecked />
                  <Button variant="brand" size="lg" type="submit" style={{ width: '100%' }}>Send message</Button>
                </form>
              )}
            </div>
          </Card>
          </div>
        );
      }

      return (
        <div className="page">
          <div className="heroband k-dark">
            <Navbar cta="Enter Court" />
            <section style={{ padding: '40px 0 88px' }}>
              <div className="wrap" style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 56, alignItems: 'start' }}>
                <ContactInfo />
                <FormCard />
              </div>
            </section>
          </div>
          <Footer />
        </div>
      );
    }
    const start = () => {
      if (!window.KlerosDesignSystem_398995) return void requestAnimationFrame(start);
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    };
    start();
  </script>
</body>
</html>
