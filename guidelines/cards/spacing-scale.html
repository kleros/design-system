<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Base unit 8px — multiples of 8" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: #fff; color: var(--k-ink-2); font-family: var(--font-body); }
  .row { display: flex; gap: 20px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .bar { background: color-mix(in srgb, var(--k-purple) 18%, #fff); border: 1px solid color-mix(in srgb, var(--k-purple) 35%, #fff); border-radius: 4px; }
  .lab { font-size: 12px; }
</style>
</head>
<body class="k-root">
  <div class="row">
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><span class="lab">8</span></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><span class="lab">16</span></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><span class="lab">24</span></div>
    <div class="item"><div class="bar" style="width:32px;height:32px"></div><span class="lab">32</span></div>
    <div class="item"><div class="bar" style="width:48px;height:48px"></div><span class="lab">48</span></div>
    <div class="item"><div class="bar" style="width:64px;height:64px"></div><span class="lab">64</span></div>
  </div>
</body>
</html>
